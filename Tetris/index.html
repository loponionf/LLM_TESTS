<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris V1</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="game-container">
    <canvas id="board" width="300" height="600"></canvas>

    <div id="side-panel">
      <div id="hud">
        <div class="hud-row"><span class="hud-label">Score</span><span class="hud-value" id="score">0</span></div>
        <div class="hud-row"><span class="hud-label">Best</span><span class="hud-value" id="best-score">0</span></div>
        <div class="hud-row"><span class="hud-label">Level</span><span class="hud-value" id="level">1</span></div>
        <div class="hud-row"><span class="hud-label">Lines</span><span class="hud-value" id="lines">0</span></div>
      </div>

      <div id="hold-piece-container">
        <span id="hold-piece-label">Hold</span>
        <canvas id="hold-piece" width="120" height="120"></canvas>
      </div>

      <div id="next-piece-container">
        <span id="next-piece-label">Next</span>
        <canvas id="next-piece" width="120" height="120"></canvas>
      </div>

      <div id="button-row">
        <button id="pause-btn">Pause</button>
        <button id="restart-btn">Restart</button>
      </div>

      <div id="best-score-row">
        <button id="reset-best-btn">Reset Best</button>
      </div>

      <div id="help-panel">
        <span class="help-label">Controls</span>
        <div class="help-row"><kbd>←</kbd><span>Move left</span></div>
        <div class="help-row"><kbd>→</kbd><span>Move right</span></div>
        <div class="help-row"><kbd>↓</kbd><span>Soft drop</span></div>
        <div class="help-row"><kbd>↑</kbd><span>Rotate</span></div>
        <div class="help-row"><kbd>Space</kbd><span>Hard drop</span></div>
        <div class="help-row"><kbd>C</kbd><span>Hold</span></div>
      </div>
    </div>

    <div id="game-over" style="display:none;"></div>
    <div id="start-overlay">
      <h1>TETRIS</h1>
      <p>Arrow keys to move · Up to rotate · Space to hard drop</p>
      <p>C to hold · P or Pause button to pause</p>
      <button id="start-btn">Start Game</button>
      <p class="start-hint">or press Enter</p>
    </div>
  </div>

  <script type="module" src="js/constants.js"></script>
  <script type="module" src="js/pieces.js"></script>
  <script type="module" src="js/board.js"></script>
  <script type="module" src="js/gameState.js"></script>
  <script type="module" src="js/renderer.js"></script>
  <script type="module" src="js/input.js"></script>
  <script type="module" src="js/gameLoop.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
